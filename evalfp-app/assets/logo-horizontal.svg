<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <!-- EvalFP wordmark horizontal — lápiz + tipografía -->

  <!-- Icon background (via CSS gradient en la app; aquí terracota para SVG standalone) -->
  <rect x="0" y="10" width="100" height="100" rx="22" fill="#c9682d"/>

  <!-- Pencil body -->
  <rect x="41" y="20" width="18" height="52" rx="5" fill="#ffffff"/>
  <!-- Eraser cap — teal -->
  <rect x="41" y="12" width="18" height="13" rx="5" fill="#0D9488"/>
  <!-- Eraser band -->
  <rect x="41" y="30" width="18" height="5" fill="rgba(255,255,255,.35)"/>
  <!-- Tip wood -->
  <polygon points="41,72 59,72 50,90" fill="#FDE68A"/>
  <!-- Tip graphite -->
  <polygon points="45,83 55,83 50,90" fill="#374151"/>

  <!-- Wordmark -->
  <text x="118" y="72"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="52" font-weight="900" fill="#c9682d" letter-spacing="-2">Eval</text>
  <text x="118" y="104"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="30" font-weight="900" fill="#2a2620" letter-spacing="-1">Cuaderno del Profesor</text>
</svg>
